<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel Login - Guluu Store</title>
    <link rel="stylesheet" href="css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://img.icons8.com/color/96/000000/shopping-bag.png"
    />
  </head>
  <body>
    <div class="background-wrapper">
      <!-- Particle Canvas disabled for better performance -->
      <!-- <canvas id="particleCanvas"></canvas> -->

      <!-- Floating shapes tetap -->
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
      </div>

        <main class="login-main">
          <div class="login-card">
            <div class="card-header">
              <h2>Masuk ke Dashboard</h2>
              <p>Silakan masuk dengan akun admin Anda</p>
            </div>

            <form id="loginForm" class="login-form">
              <div class="form-group">
                <label for="username">
                  <i class="fas fa-user"></i>
                  <span>Username / Email</span>
                </label>
                <div class="input-wrapper">
                  <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="admin@guluustore.com"
                    autocomplete="off"
                  />
                  <div class="input-focus-line"></div>
                </div>
                <div class="error-message" id="usernameError"></div>
              </div>

              <div class="form-group">
                <label for="password">
                  <i class="fas fa-lock"></i>
                  <span>Password</span>
                </label>
                <div class="input-wrapper">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    class="toggle-password"
                    id="togglePassword"
                  >
                    <i class="fas fa-eye"></i>
                  </button>
                  <div class="input-focus-line"></div>
                </div>
                <div class="error-message" id="passwordError"></div>
              </div>

              <div class="form-options">
                <label class="remember-me">
                  <input type="checkbox" id="rememberMe" />
                  <span class="checkmark"></span>
                  Ingat Saya
                </label>
              </div>

              <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Login</span>
                <i class="fas fa-arrow-right"></i>
                <div class="btn-shine"></div>
              </button>

              <div class="login-footer">
                <p>
                  Demo Account: <code>admin</code> / <code>guluustore123</code>
                </p>
              </div>
            </form>

            <div class="card-footer">
              <p>
                <i class="fas fa-shield-alt"></i> Akses terbatas untuk staf
                Guluu Store saja
              </p>
            </div>
          </div>

          <div class="notification" id="notification">
            <i class="fas fa-check-circle"></i>
            <span>Login berhasil! Mengarahkan ke dashboard...</span>
          </div>
        </main>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <!-- Particle script disabled for performance -->
    <!-- <script src="js/particles.js"></script> -->
  </body>
</html>
